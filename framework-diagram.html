<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MultiAgentCCI Framework Architecture</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem;
      color: #1a1a2e;
    }
    .container {
      max-width: 960px;
      width: 100%;
    }
    h1 {
      text-align: center;
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      color: #1a1a2e;
    }
    .subtitle {
      text-align: center;
      font-size: 0.8rem;
      color: #6b7280;
      margin-bottom: 1.5rem;
    }
    .diagram-card {
      background: #fafbfc;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 1.5rem;
    }
    svg { width: 100%; display: block; }
    .legend-row {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-top: 1.5rem;
      flex-wrap: wrap;
      font-size: 0.75rem;
      color: #4b5563;
    }
    .legend-item { display: flex; align-items: center; gap: 0.4rem; }
    .legend-swatch {
      width: 20px; height: 14px;
      border-radius: 3px;
      border: 1.5px solid;
    }
    .footer {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.7rem;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>MultiAgentCCI 多智能体协作框架</h1>
    <p class="subtitle">Generator-Reviewer Paradigm for Code-Comment Inconsistency Detection &amp; Rectification</p>

    <div class="diagram-card">
      <svg viewBox="0 0 900 960" xmlns="http://www.w3.org/2000/svg">

        <!-- ===== DEFS ===== -->
        <defs>
          <!-- Arrowhead markers -->
          <marker id="arrow-black" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
            <polygon points="0 0, 10 4, 0 8" fill="#374151"/>
          </marker>
          <marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
            <polygon points="0 0, 10 4, 0 8" fill="#2563eb"/>
          </marker>
          <marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
            <polygon points="0 0, 10 4, 0 8" fill="#059669"/>
          </marker>
          <marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
            <polygon points="0 0, 10 4, 0 8" fill="#dc2626"/>
          </marker>
          <marker id="arrow-orange" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
            <polygon points="0 0, 10 4, 0 8" fill="#d97706"/>
          </marker>
          <marker id="arrow-gray" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
            <polygon points="0 0, 10 4, 0 8" fill="#9ca3af"/>
          </marker>

          <!-- Drop shadow filter -->
          <filter id="shadow" x="-5%" y="-5%" width="115%" height="120%">
            <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000020"/>
          </filter>
          <filter id="shadow-light" x="-3%" y="-3%" width="108%" height="112%">
            <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000012"/>
          </filter>
        </defs>

        <!-- ===== BACKGROUND ===== -->
        <rect width="900" height="960" fill="#ffffff"/>

        <!-- ================================================================ -->
        <!-- INPUT LAYER: Code + Comment -->
        <!-- ================================================================ -->

        <!-- Code Input Box -->
        <rect x="250" y="18" width="160" height="52" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow-light)"/>
        <text x="330" y="40" fill="#1e40af" font-size="13" font-weight="700" text-anchor="middle">代码片段</text>
        <text x="330" y="56" fill="#6b7280" font-size="10" text-anchor="middle">Code Snippet</text>

        <!-- Comment Input Box -->
        <rect x="490" y="18" width="160" height="52" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" filter="url(#shadow-light)"/>
        <text x="570" y="40" fill="#166534" font-size="13" font-weight="700" text-anchor="middle">原始注释</text>
        <text x="570" y="56" fill="#6b7280" font-size="10" text-anchor="middle">Original Comment</text>

        <!-- Input arrows merging down -->
        <line x1="330" y1="70" x2="330" y2="95" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow-black)"/>
        <line x1="570" y1="70" x2="570" y2="95" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow-black)"/>
        <line x1="330" y1="88" x2="570" y2="88" stroke="#374151" stroke-width="1.8"/>
        <line x1="450" y1="88" x2="450" y2="108" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow-black)"/>

        <!-- ================================================================ -->
        <!-- AGENT 1: ContextParser -->
        <!-- ================================================================ -->
        <rect x="265" y="112" width="370" height="70" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2.5" filter="url(#shadow)"/>
        <rect x="265" y="112" width="370" height="22" rx="8" fill="#3b82f6"/>
        <rect x="265" y="126" width="370" height="8" fill="#3b82f6"/> <!-- flat bottom -->
        <text x="450" y="128" fill="#ffffff" font-size="12" font-weight="700" text-anchor="middle">① ContextParser 上下文解析智能体</text>
        <text x="450" y="154" fill="#1e40af" font-size="11" font-weight="600" text-anchor="middle">tree-sitter 确定性解析 Java 方法签名 / 参数类型 / 返回类型</text>
        <text x="450" y="172" fill="#6b7280" font-size="9" text-anchor="middle">产出: intention_context · interface_context · implementation_context</text>

        <!-- Arrow down -->
        <line x1="450" y1="182" x2="450" y2="205" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow-black)"/>

        <!-- ================================================================ -->
        <!-- AGENT 2: Detector -->
        <!-- ================================================================ -->
        <rect x="180" y="210" width="540" height="100" rx="8" fill="#fefce8" stroke="#eab308" stroke-width="2.5" filter="url(#shadow)"/>
        <rect x="180" y="210" width="540" height="22" rx="8" fill="#eab308"/>
        <rect x="180" y="224" width="540" height="8" fill="#eab308"/>
        <text x="450" y="226" fill="#1a1a2e" font-size="12" font-weight="700" text-anchor="middle">② Detector 一致性检测智能体</text>

        <!-- Rule Engine sub-box -->
        <rect x="198" y="248" width="180" height="50" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
        <text x="288" y="270" fill="#854d0e" font-size="11" font-weight="600" text-anchor="middle">规则引擎 Rule Engine</text>
        <text x="288" y="288" fill="#a16207" font-size="9" text-anchor="middle">硬判定: void+@return → 直接拒绝</text>

        <!-- Arrow between rule and LLM -->
        <line x1="378" y1="273" x2="410" y2="273" stroke="#ca8a04" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
        <text x="394" y="268" fill="#a16207" font-size="8" text-anchor="middle">fallback</text>

        <!-- LLM Judge sub-box -->
        <rect x="412" y="248" width="180" height="50" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
        <text x="502" y="270" fill="#854d0e" font-size="11" font-weight="600" text-anchor="middle">LLM 判定</text>
        <text x="502" y="288" fill="#a16207" font-size="9" text-anchor="middle">逐条 claim 验证 + Few-shot</text>

        <!-- RAG label on the right side of Detector -->
        <rect x="610" y="248" width="95" height="50" rx="6" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4,3"/>
        <text x="657" y="268" fill="#4b5563" font-size="10" font-weight="600" text-anchor="middle">RAG 检索</text>
        <text x="657" y="284" fill="#6b7280" font-size="8" text-anchor="middle">BM25</text>
        <text x="657" y="294" fill="#6b7280" font-size="8" text-anchor="middle">+ S-BERT</text>

        <!-- RAG connection arrow -->
        <line x1="592" y1="273" x2="608" y2="273" stroke="#9ca3af" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#arrow-gray)"/>

        <!-- Arrow down from Detector -->
        <line x1="450" y1="310" x2="450" y2="340" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow-black)"/>

        <!-- ================================================================ -->
        <!-- DECISION DIAMOND -->
        <!-- ================================================================ -->
        <polygon points="450,345 530,400 450,455 370,400" fill="#ffffff" stroke="#6366f1" stroke-width="2.5" filter="url(#shadow-light)"/>
        <text x="450" y="396" fill="#4338ca" font-size="12" font-weight="700" text-anchor="middle">一致?</text>
        <text x="450" y="412" fill="#6b7280" font-size="9" text-anchor="middle">Consistent?</text>

        <!-- ================================================================ -->
        <!-- LEFT BRANCH: YES → Output "Consistent" -->
        <!-- ================================================================ -->
        <line x1="370" y1="400" x2="170" y2="400" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>
        <text x="270" y="393" fill="#059669" font-size="11" font-weight="700">YES</text>

        <rect x="50" y="370" width="120" height="60" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2.5" filter="url(#shadow-light)"/>
        <text x="110" y="396" fill="#065f46" font-size="13" font-weight="700" text-anchor="middle">✓ 一致</text>
        <text x="110" y="416" fill="#6b7280" font-size="9" text-anchor="middle">无需修改</text>

        <!-- ================================================================ -->
        <!-- RIGHT BRANCH: NO → Rectifier → Reviewer loop -->
        <!-- ================================================================ -->
        <line x1="530" y1="400" x2="650" y2="400" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)"/>
        <text x="590" y="393" fill="#dc2626" font-size="11" font-weight="700">NO</text>

        <!-- AGENT 3: Rectifier -->
        <rect x="650" y="300" width="210" height="70" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2.5" filter="url(#shadow)"/>
        <rect x="650" y="300" width="210" height="22" rx="8" fill="#ef4444"/>
        <rect x="650" y="314" width="210" height="8" fill="#ef4444"/>
        <text x="755" y="316" fill="#ffffff" font-size="12" font-weight="700" text-anchor="middle">③ Rectifier 注释修正智能体</text>
        <text x="755" y="342" fill="#991b1b" font-size="10" font-weight="600" text-anchor="middle">最小编辑原则 Minimal Edit</text>
        <text x="755" y="360" fill="#6b7280" font-size="9" text-anchor="middle">仅修正不一致字段 · 保留注释结构</text>

        <!-- Arrow Rectifier → Reviewer -->
        <line x1="755" y1="370" x2="755" y2="400" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow-black)"/>

        <!-- AGENT 4: Reviewer -->
        <rect x="630" y="405" width="250" height="70" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2.5" filter="url(#shadow)"/>
        <rect x="630" y="405" width="250" height="22" rx="8" fill="#8b5cf6"/>
        <rect x="630" y="419" width="250" height="8" fill="#8b5cf6"/>
        <text x="755" y="421" fill="#ffffff" font-size="12" font-weight="700" text-anchor="middle">④ Reviewer 审查智能体</text>
        <text x="755" y="447" fill="#5b21b6" font-size="10" font-weight="600" text-anchor="middle">事实性 · 完整性 · 格式检查</text>
        <text x="755" y="465" fill="#6b7280" font-size="9" text-anchor="middle">PASS → 输出修正注释 ｜ REJECT → 重试修正 (≤3次)</text>

        <!-- Decision from Reviewer -->
        <line x1="755" y1="475" x2="755" y2="508" stroke="#374151" stroke-width="1.8"/>

        <!-- PASS branch -->
        <line x1="755" y1="508" x2="300" y2="508" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>
        <text x="530" y="520" fill="#059669" font-size="11" font-weight="700" text-anchor="middle">PASS</text>

        <!-- Output: Rectified Comment -->
        <rect x="180" y="522" width="120" height="55" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2.5" filter="url(#shadow-light)"/>
        <text x="240" y="546" fill="#065f46" font-size="13" font-weight="700" text-anchor="middle">✓ 修正注释</text>
        <text x="240" y="564" fill="#6b7280" font-size="9" text-anchor="middle">Rectified Output</text>

        <!-- Arrow from output upward (for both paths) -->
        <!-- PASS output descends -->
        <line x1="300" y1="550" x2="180" y2="550" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>

        <!-- REJECT loop back to Rectifier -->
        <path d="M 640 460 L 610 460 L 610 335 L 648 335" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-red)"/>
        <text x="610" y="395" fill="#dc2626" font-size="10" font-weight="700" transform="rotate(-90, 610, 395)">REJECT 反馈</text>

        <!-- Retry counter -->
        <rect x="590" y="370" width="42" height="18" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
        <text x="611" y="383" fill="#dc2626" font-size="9" font-weight="700" text-anchor="middle">≤3次</text>

        <!-- ================================================================ -->
        <!-- RAG DETAIL PANEL (bottom-left) -->
        <!-- ================================================================ -->
        <rect x="50" y="610" width="260" height="130" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
        <text x="180" y="634" fill="#374151" font-size="11" font-weight="700" text-anchor="middle">RAG 检索增强生成</text>
        <line x1="80" y1="642" x2="280" y2="642" stroke="#e5e7eb" stroke-width="1"/>

        <text x="70" y="663" fill="#4b5563" font-size="10" font-weight="600">检索策略</text>
        <text x="70" y="682" fill="#6b7280" font-size="9">• BM25 稀疏检索 (词汇匹配)</text>
        <text x="70" y="698" fill="#6b7280" font-size="9">• Sentence-BERT 稠密检索 (语义)</text>
        <text x="70" y="714" fill="#6b7280" font-size="9">• 混合排序 + 类型感知过滤</text>

        <text x="70" y="735" fill="#4b5563" font-size="10" font-weight="600">训练语料</text>
        <text x="70" y="750" fill="#6b7280" font-size="9">• Just-In-Time 数据集 (Param / Return / Summary)</text>

        <!-- ================================================================ -->
        <!-- DETECTOR DETAIL PANEL (bottom-right) -->
        <!-- ================================================================ -->
        <rect x="350" y="610" width="500" height="130" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
        <text x="600" y="634" fill="#374151" font-size="11" font-weight="700" text-anchor="middle">检测管线详细流程</text>
        <line x1="380" y1="642" x2="820" y2="642" stroke="#e5e7eb" stroke-width="1"/>

        <!-- Step boxes -->
        <rect x="370" y="655" width="95" height="36" rx="5" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.2"/>
        <text x="417" y="671" fill="#1e40af" font-size="9" font-weight="600" text-anchor="middle">Step 1</text>
        <text x="417" y="684" fill="#6b7280" font-size="8" text-anchor="middle">注释类型识别</text>

        <line x1="465" y1="673" x2="485" y2="673" stroke="#93c5fd" stroke-width="1.2" marker-end="url(#arrow-blue)"/>

        <rect x="488" y="655" width="95" height="36" rx="5" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.2"/>
        <text x="535" y="671" fill="#1e40af" font-size="9" font-weight="600" text-anchor="middle">Step 2</text>
        <text x="535" y="684" fill="#6b7280" font-size="8" text-anchor="middle">规则硬判定</text>

        <line x1="583" y1="673" x2="603" y2="673" stroke="#93c5fd" stroke-width="1.2" marker-end="url(#arrow-blue)"/>

        <rect x="606" y="655" width="105" height="36" rx="5" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.2"/>
        <text x="658" y="671" fill="#1e40af" font-size="9" font-weight="600" text-anchor="middle">Step 3</text>
        <text x="658" y="684" fill="#6b7280" font-size="8" text-anchor="middle">LLM Claim验证</text>

        <line x1="711" y1="673" x2="731" y2="673" stroke="#93c5fd" stroke-width="1.2" marker-end="url(#arrow-blue)"/>

        <rect x="734" y="655" width="95" height="36" rx="5" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.2"/>
        <text x="781" y="671" fill="#065f46" font-size="9" font-weight="600" text-anchor="middle">输出</text>
        <text x="781" y="684" fill="#6b7280" font-size="8" text-anchor="middle">判定+原因</text>

        <!-- Bottom note -->
        <text x="600" y="720" fill="#6b7280" font-size="9" text-anchor="middle">规则引擎可独立处理 ~30% 的样本 (void+@return / 返回类型不匹配等)，剩余交由 LLM 判定</text>
        <text x="600" y="736" fill="#9ca3af" font-size="8" text-anchor="middle">支持 glm-4 / deepseek / gpt-4o / gemini-2.5 等多模型后端</text>

        <!-- ================================================================ -->
        <!-- WORKFLOW TITLE / HEADER -->
        <!-- ================================================================ -->
        <rect x="265" y="770" width="370" height="40" rx="8" fill="#1e293b"/>
        <text x="450" y="795" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">WorkflowOrchestrator 工作流编排引擎</text>

        <!-- Dashed boundary around the whole pipeline -->
        <rect x="25" y="6" width="850" height="820" rx="12" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="8,4"/>
        <text x="35" y="22" fill="#94a3b8" font-size="9">MultiAgentCCI Pipeline</text>

      </svg>
    </div>

    <!-- Legend -->
    <div class="legend-row">
      <div class="legend-item">
        <div class="legend-swatch" style="background:#eff6ff;border-color:#3b82f6;"></div>
        <span>上下文解析</span>
      </div>
      <div class="legend-item">
        <div class="legend-swatch" style="background:#fefce8;border-color:#eab308;"></div>
        <span>一致性检测</span>
      </div>
      <div class="legend-item">
        <div class="legend-swatch" style="background:#fef2f2;border-color:#ef4444;"></div>
        <span>注释修正</span>
      </div>
      <div class="legend-item">
        <div class="legend-swatch" style="background:#f5f3ff;border-color:#8b5cf6;"></div>
        <span>审查校验</span>
      </div>
      <div class="legend-item">
        <div class="legend-swatch" style="background:#f3f4f6;border-color:#9ca3af;border-style:dashed;"></div>
        <span>RAG 检索</span>
      </div>
    </div>

    <p class="footer">
      MultiAgentCCI · Multi-Agent Code-Comment Inconsistency Detection &amp; Rectification · ICSE 2025 C4RLLaMA
    </p>
  </div>
</body>
</html>
